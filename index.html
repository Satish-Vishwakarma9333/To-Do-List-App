<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Premium To-Do App</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2,#ff6ec4);
    overflow:hidden;
}

/* floating glow */
body::before, body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    filter:blur(80px);
    z-index:-1;
}
body::before{background:#ff4ecd;top:-100px;left:-100px;}
body::after{background:#4cc9f0;bottom:-100px;right:-100px;}

.todo-container{
    width:420px;
    padding:25px;
    border-radius:22px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
}

h1{
    text-align:center;
    color:white;
    margin-bottom:20px;
}

.input-area{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

input{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    outline:none;
    background:rgba(255,255,255,0.25);
    color:white;
}

input::placeholder{color:#eee;}

button{
    padding:14px 16px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    color:white;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    transition:0.2s;
}

button:hover{transform:scale(1.05);}

#taskList{
    list-style:none;
    max-height:350px;
    overflow-y:auto;
}

.task-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px;
    margin-bottom:10px;
    border-radius:14px;
    background:rgba(255,255,255,0.18);
    color:white;
}

.task-item span{flex:1;}

.completed{
    text-decoration:line-through;
    opacity:0.5;
}

.actions{
    display:flex;
    gap:8px;
}

.actions button{
    width:35px;
    height:35px;
    border-radius:10px;
}

.complete-btn{background:#00e676;}
.delete-btn{background:#ff1744;}

/* celebration */
.celebration{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    background:linear-gradient(45deg,#ff9800,#ff4081);
    color:white;
    padding:25px 40px;
    border-radius:20px;
    font-size:24px;
    font-weight:bold;
    z-index:9999;
}

.celebration.show{
    animation:pop .6s ease forwards;
}

@keyframes pop{
    0%{transform:translate(-50%,-50%) scale(0);}
    70%{transform:translate(-50%,-50%) scale(1.2);}
    100%{transform:translate(-50%,-50%) scale(1);}
}

.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}
</style>
</head>

<body>

<div class="todo-container">
    <h1>📝 To-Do List</h1>

    <div class="input-area">
        <input id="taskInput" type="text" placeholder="Enter task...">
        <button id="addBtn">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<div id="celebration" class="celebration"></div>

<script>
const taskInput = document.getElementById("taskInput");
const addBtn = document.getElementById("addBtn");
const taskList = document.getElementById("taskList");
const celebration = document.getElementById("celebration");

const messages = [
    "🏆 Awesome Work!",
    "🚀 You Did It!",
    "⭐ Great Job!",
    "🔥 Task Crushed!",
    "🎉 Congratulations!",
    "💯 Excellent!"
];

/* ADD TASK */
function addTask(){
    const text = taskInput.value.trim();
    if(!text) return alert("Enter a task!");

    createTask(text);
    taskInput.value="";
}

addBtn.addEventListener("click", addTask);

/* ENTER KEY FIX */
taskInput.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
        e.preventDefault();
        addTask();
    }
});

/* CREATE TASK */
function createTask(text){
    const li = document.createElement("li");
    li.className="task-item";

    const span = document.createElement("span");
    span.textContent=text;

    const actions = document.createElement("div");
    actions.className="actions";

    const completeBtn = document.createElement("button");
    completeBtn.textContent="✓";
    completeBtn.className="complete-btn";

    completeBtn.onclick=()=>{
        span.classList.toggle("completed");
        if(span.classList.contains("completed")){
            showCelebration();
        }
    };

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent="🗑";
    deleteBtn.className="delete-btn";

    deleteBtn.onclick=()=>li.remove();

    actions.appendChild(completeBtn);
    actions.appendChild(deleteBtn);

    li.appendChild(span);
    li.appendChild(actions);

    taskList.appendChild(li);
}

/* CELEBRATION */
function showCelebration(){
    const msg = messages[Math.floor(Math.random()*messages.length)];
    celebration.textContent = msg;
    celebration.classList.add("show");

    createConfetti();

    setTimeout(()=>{
        celebration.classList.remove("show");
    },2000);
}

/* CONFETTI */
function createConfetti(){
    const colors=["#ff1744","#ffea00","#00e676","#2979ff","#ff9100","#d500f9"];

    for(let i=0;i<100;i++){
        const c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=colors[Math.floor(Math.random()*colors.length)];
        c.style.animationDuration=(Math.random()*2+2)+"s";

        document.body.appendChild(c);
        setTimeout(()=>c.remove(),4000);
    }
}
</script>

</body>
</html>
